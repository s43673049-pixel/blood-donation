<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 — Page Not Found</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* BODY */

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#ff4d4d,#b30000);

color:white;

}

/* CARD */

.container{

text-align:center;

background:white;
color:#333;

padding:40px;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.3);

width:400px;

animation:fadeIn 0.6s ease;

}

/* TITLE */

.error-code{

font-size:72px;
font-weight:bold;
color:#b30000;

}

/* MESSAGE */

.message{

margin:15px 0;

font-size:18px;

}

/* URL */

.url{

font-size:14px;
color:#666;
margin-bottom:20px;
word-break:break-all;

}

/* BUTTON */

button{

background:#b30000;

color:white;

border:none;

padding:12px 20px;

font-size:16px;

border-radius:6px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#ff1a1a;

transform:scale(1.05);

}

/* ANIMATION */

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>
<body>

<div class="container">

<div class="error-code">404</div>

<div class="message">
Page not found
</div>

<div class="url" id="brokenURL"></div>

<button onclick="goHome()" >
Go to Home
</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";


/* =====================
SHOW BROKEN URL
===================== */

const brokenURL = window.location.href;

document.getElementById("brokenURL")
.innerText = brokenURL;


/* =====================
LOG TO FIREBASE
===================== */

async function log404(){

try{

await addDoc(collection(db,"errorLogs"),{

url: brokenURL,

userAgent: navigator.userAgent,

time: serverTimestamp()

});

console.log("404 logged");

}catch(err){

console.error(err);

}

}

log404();


/* =====================
HOME BUTTON
===================== */

window.goHome = function(){

window.location.href = "index.html";

};

</script>

</body>
</html>
