<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBMS Dashboard</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap">
<link rel="stylesheet" href="css/layout.css">

</head>
<body>

<header class="header">
    <h2>Blood Bank Management System</h2>
    <!-- Burger icon (mobile only) -->
    <div class="burger" id="burger">
        ☰
    </div>

    <!-- Navigation -->
    <nav class="nav-links" id="navLinks">
        <a href="admin.html">Admin</a>
        <a href="overview.html" class="active">
            Overview
        </a>
        <a href="verification.html">
            Verification
        </a>
        <a href="facilities.html">
            Facilities
        </a>
        <a href="donors.html">
            Donors
        </a>
    </nav>
</header>

<section class="stats">
    <div class="card" id="donorCard">
        <h3 id="donorCount">0</h3>
        <p>Total Donors</p>
    </div>

    <div class="card" id="donationCard">
        <h3 id="donationCount">0</h3>
        <p>Total Donations</p>
    </div>

    <div class="card" id="campCard">
        <h3 id="campCount">0</h3>
        <p>Blood Camps</p>
    </div>

    <div class="card" id="facilityCard">
        <h3 id="facilityCount">0</h3>
        <p>Facilities</p>
    </div>
</section>

<section class="recent">

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Blood Group</th>
                <th>Contact</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="donorTable">
        </tbody>
    </table>
</section>

<!-- footer -->
<footer class="footer">

    <div class="footer-container">

        <div class="footer-brand">
            <h3>BBMS</h3>
            <p>Blood Bank Management System</p>
        </div>

        <div class="footer-info">
            <p id="systemStatus">System Status: Online</p>
            <p>© 2026 BBMS. All rights reserved.</p>
        </div>

    </div>

</footer>


<!-- js -->
<script type="module" src="js/main.js"></script>

<!-- menu toggle -->
<script>
const burger = document.getElementById("burger");
const navLinks = document.getElementById("navLinks");

burger.addEventListener("click", () => {

    navLinks.classList.toggle("show");

});
</script>


 <script type="module" src="request.js"></script>
</body>
</html>
