<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Donors - Blood Donation Camp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../../css/donors.css" rel="stylesheet">

</head>

<body>

<!-- Sidebar -->
<aside class="sidebar" aria-label="Admin navigation">
    <div class="logo">Blood Bank Admin</div>
    <nav>
        <ul>
            <li><a href="./admin.html" class="nav-link active">Overview</a></li>
            <li><a href="../admin/donors.html">Donors</a></li>
            <li><a href="../admin/verification.html">Verification</a></li>

            <li><a href="../admin/facilities.html">Facilities</a></li>
            <li><a href="../admin/camps.html">Camps</a></li>
        </ul>
    </nav>
</aside>

<!-- Main Content -->
<main class="main-content">

    <header class="navbar">
        <h1>Manage Donors</h1>
        <div class="navbar-user">
            <div class="avatar" aria-hidden="true">A</div>
            <span class="user-name">Admin</span>
        </div>
    </header>

    <!-- Filters and actions -->
    <section class="top-actions" aria-label="Donor filters and actions">
        <div class="filters">
            <input type="text" id="searchName" placeholder="Search by name">
            <select id="filterBlood">
                <option value="">All blood groups</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
            <input type="text" id="filterCity" placeholder="Filter by city">
            <button class="profile-btn" id="refreshDonorsBtn" type="button">Refresh</button>
        </div>
    </section>

    <!-- Donors Table -->
    <section class="table-box" aria-label="All donors list">
        <h2>All Donors</h2>
        <table id="allDonorsTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Blood Group</th>
                    <th>Contact</th>
                    <th>City</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Filled by donors.js -->
            </tbody>
        </table>
    </section>

</main>

<script type="module" src="../../js/modules/donors.js"></script>
</body>
</html>
