<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Blood Bank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="../../css/admin.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">  

    <!-- icons -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <style>body { visibility: hidden; }</style>
</head>

<body>
<script type="module" src="../../js/guards/adminGuard.js"></script>

<!-- Sidebar -->
<aside class="sidebar" aria-label="Admin navigation">
    <div class="logo">Blood Bank Admin</div>
    <nav>
        <ul>
            <li><a href="./admin.html" class="nav-link active">Overview</a></li>
            <li><a href="../admin/donors.html">Donors</a></li>
            <li><a href="../admin/verification.html">Verification</a></li>

            <li><a href="../admin/facilities.html">Facilities</a></li>
            <li><a href="../admin/camps.html">Camps</a></li>
        </ul>
    </nav>
</aside>

<!-- Main Content -->
<main class="main-content">

    <header class="navbar">
        <h1>Admin Dashboard</h1>
        <div class="navbar-user">
            <div class="avatar" aria-hidden="true">A</div>
            <span class="user-name">Admin</span>
            <button class="icon-btn" id="logoutBtn" title="Logout" aria-label="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Top actions -->
    <section class="top-actions" aria-label="Dashboard actions">
        <button class="profile-btn" id="refreshBtn" type="button">Refresh data</button>
    </section>

    <!-- Cards -->
    <section class="cards" aria-label="Key statistics">
        <div class="card">
            <h3>Total Donors</h3>
            <p id="totalDonors">0</p>
        </div>

        <div class="card">
            <h3>Total Donations</h3>
            <p id="totalDonations">0</p>
        </div>

        <div class="card">
            <h3>Facilities</h3>
            <p id="totalFacilities">0</p>
        </div>

        <div class="card">
            <h3>Blood Camps</h3>
            <p id="activeCamps">0</p>
        </div>

        <div class="card">
            <h3>Active Donors</h3>
            <p id="activeDonors">0</p>
        </div>
    </section>

    <!-- Recent Donors Table -->
    <section class="table-box" aria-label="Recent donors list">
        <h2>Recent Donors</h2>
        <table id="donorsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Blood Group</th>
                    <th>Contact</th>
                    <th>City</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Filled by admin.js -->
                <tr>
            <td colspan="5">
              Loading donors...
            </td>
          </tr>
            </tbody>
        </table>
    </section>

</main>

<script type="module" src="../../js/modules/admin.js"></script>
</body>
</html>
