<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Blood Request</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/forms.css">
</head>

<body>

<div class="container">
    <h2>Create Blood Request</h2>

    <form id="requestForm" novalidate>

        <div class="form-group">
            <label for="patientName">Patient Name</label>
            <input type="text" id="patientName" name="patient_name" required>
        </div>

        <div class="form-group">
            <label for="requiredBlood">Blood Group Needed</label>
            <select id="requiredBlood" name="blood_group" required>
                <option value="">Select Blood Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        </div>

        <div class="form-group">
            <label for="units">Units Required</label>
            <input type="number" id="units" name="units" min="1" required>
        </div>

        <div class="form-group">
            <label for="hospital">Hospital Name</label>
            <input type="text" id="hospital" name="hospital" required>
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" required>
        </div>

        <div class="form-group">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" name="contact" pattern="[0-9]{10}" required>
        </div>

        <div class="form-group">
            <label for="urgency">Urgency Level</label>
            <select id="urgency" name="urgency" required>
                <option value="">Select Urgency</option>
                <option value="Normal">Normal</option>
                <option value="Urgent">Urgent</option>
                <option value="Emergency">Emergency</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Additional Notes</label>
            <textarea id="notes" name="notes"></textarea>
        </div>

        <button type="submit" id="submitRequestBtn">Submit Request</button>

    </form>

    <p id="message" class="message" aria-live="polite"></p>

    <p class="message" style="margin-top: 8px; font-size: 0.85rem;">
        <a href="dashboard.html">← Back to Dashboard</a>
    </p>
</div>

<script type="module" src="../../js/modules/requests.js"></script>

</body>
</html>
