<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="../../css/forms.css">
</head>
<body>

  <div class="container">

    <h2>Admin Login</h2>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" name="email" placeholder="Enter email" required>
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit" id="loginBtn">Login</button>

    </form>

    <p id="loginMessage" class="message" aria-live="polite"></p>

    <p class="message" style="margin-top: 8px; font-size: 0.85rem;">
      New donor? <a href="./register.html">Register here</a>
    </p>

  </div>

  <script type="module" src="../../js/modules/login.js"></script>
</body>
</html>
