<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donor Registration</title>

<link rel="stylesheet" href="../../css/forms.css">

</head>
<body>

<div class="container">

  <h2>Blood Donor Registration</h2>

  <form id="donorForm" novalidate>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter full name" required>
    </div>

    <div class="form-group">
      <label for="age">Age</label>
      <input type="number" id="age" name="age" placeholder="Enter age" required>
    </div>

    <div class="form-group">
      <label for="gender">Gender</label>
      <select id="gender" name="gender" required>
        <option value="">Select gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter email" required>
    </div>

    <div class="form-group">
      <label for="contact">Contact Number</label>
      <input type="tel" id="contact" name="contact" placeholder="Enter phone number" required>
    </div>

    <div class="form-group">
      <label for="bloodGroup">Blood Group</label>
      <select id="bloodGroup" name="bloodGroup" required>
        <option value="">Select blood group</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
      </select>
    </div>

    <div class="form-group">
      <label for="city">City</label>
      <input type="text" id="city" name="city" placeholder="Enter city" required>
    </div>

    <button type="submit" id="submitBtn">Register</button>

  </form>

  <p id="message" class="message" aria-live="polite"></p>

  <div id="successAlert" class="alert" role="status" aria-live="polite">
    Registration successful!
  </div>

  <p class="message" style="margin-top: 8px; font-size: 0.85rem;">
    Already registered? <a href="./login.html">Login here</a>
  </p>

</div>

<script type="module" src="../../js/modules/register.js"></script>

</body>
</html>
