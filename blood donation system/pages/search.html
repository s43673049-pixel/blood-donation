<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Donor - Blood Donation Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<header>
    <h1>Blood Donation Management System</h1>
</header>

<div class="container">
    <h2>Search Blood Donor</h2>

    <!-- Change action to your backend file (e.g., search.php) -->
    <form action="search.php" method="GET">

        <label for="bloodgroup">Select Blood Group:</label>
        <select name="bloodgroup" id="bloodgroup" required>
            <option value="">-- Select Blood Group --</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select>

        <label for="city">Enter City:</label>
        <input type="text" name="city" id="city" placeholder="Enter city name" required>

        <button type="submit">Search Donor</button>

    </form>
</div>

<footer>
    &copy; 2026 Blood Donation Management System | All Rights Reserved
</footer>

</body>
</html>
